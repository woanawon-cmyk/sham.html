<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#020713;
      font-family:Arial, sans-serif;
      color:white;
    }
    .phone{
      width:390px;
      min-height:780px;
      padding:28px 22px;
      background:radial-gradient(circle at center,#082b77 0%,#061943 38%,#020817 100%);
      border-radius:22px;
      position:relative;
      box-shadow:0 0 35px #000;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
      font-size:18px;
    }
    .support{font-size:28px}
    .logo{
      width:120px;
      height:95px;
      margin:75px auto 60px;
      position:relative;
    }
    .logo::before,.logo::after{
      content:"";
      position:absolute;
      width:120px;
      height:38px;
      border-radius:8px;
      transform:skewY(-30deg);
    }
    .logo::before{
      background:linear-gradient(90deg,#01d3b7,#028aff);
      top:38px;
      left:-10px;
    }
    .logo::after{
      background:linear-gradient(90deg,#0b5cff,#38a1ff);
      top:0;
      right:-5px;
    }
    h1{
      text-align:right;
      font-size:32px;
      margin:0 0 30px;
    }
    .input{
      height:64px;
      background:rgba(75,130,220,.28);
      border:1px solid rgba(120,170,255,.35);
      border-radius:14px;
      margin-bottom:18px;
      display:flex;
      align-items:center;
      padding:0 18px;
      gap:12px;
      font-size:20px;
      color:#dce8ff;
    }
    .input input{
      flex:1;
      background:none;
      border:0;
      outline:0;
      color:white;
      font-size:19px;
      text-align:right;
    }
    .forgot{
      text-align:right;
      margin-bottom:26px;
      font-size:16px;
    }
    .forgot span,.signup span{color:#3fa0ff;font-weight:bold}
    .buttons{
      display:flex;
      gap:12px;
      direction:ltr;
    }
    button{
      border:0;
      height:64px;
      border-radius:14px;
      background:linear-gradient(135deg,#39adff,#1265ff);
      color:white;
      font-size:24px;
      font-weight:bold;
      cursor:pointer;
    }
    .login{flex:1}
    .qr{width:68px;font-size:30px}
    .signup{
      text-align:center;
      margin-top:18px;
      font-size:17px;
    }
    .footer{
      position:absolute;
      bottom:32px;
      left:0;
      right:0;
      text-align:center;
      color:#d6def0;
      letter-spacing:1px;
    }
    .footer .mark{
      margin:14px auto;
      width:55px;
      height:40px;
      border:5px solid #273d78;
      border-radius:12px;
      opacity:.8;
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="top">
      <div>الإنكليزية</div>
      <div class="support">🎧</div>
    </div>

    <div class="logo"></div>

    <h1>تسجيل الدخول</h1>

    <div class="input">
      <span>👤</span>
      <input type="email" placeholder="البريد الإلكتروني">
    </div>

    <div class="input">
      <span>🔒</span>
      <input type="password" placeholder="كلمة السر">
      <span>👁</span>
    </div>

    <div class="forgot">
      هل نسيت كلمة المرور؟ <span>تغيير كلمة المرور</span>
    </div>

    <div class="buttons">
      <button class="qr">▦</button>
      <button class="login">تسجيل الدخول</button>
    </div>

    <div class="signup">
      لا تملك حساب مسبقاً؟ <span>إنشاء حساب</span>
    </div>

    <div class="footer">
      <div>POWERED BY</div>
      <div class="mark"></div>
      <div>V 2.2.6</div>
    </div>
  </div>

</body>
</html>
