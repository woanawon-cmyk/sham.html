<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - تطبيق القروض</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        nav {
            background: linear-gradient(135deg, #0f2438 0%, #1a3a52 100%);
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-nav {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .nav-links a:hover {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            transform: translateY(-2px);
        }

        .nav-links a.active {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
        }

        .logout-btn {
            background: linear-gradient(135deg, #cc0000 0%, #990000 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #990000 0%, #660000 100%);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            color: white;
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            padding: 25px;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.4);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.6);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 16px;
            color: #b3d9ff;
        }

        .table-wrapper {
            background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
            margin-bottom: 30px;
        }

        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #4d94ff;
            border-radius: 8px;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.95);
            color: #1a3a52;
        }

        .search-box input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 10px rgba(0, 102, 204, 0.3);
        }

        .search-btn {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: linear-gradient(135deg, #0052a3 0%, #003d7a 100%);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }

        thead {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
        }

        th {
            padding: 15px;
            text-align: right;
            font-weight: bold;
            border-bottom: 2px solid #4d94ff;
        }

        tbody tr {
            border-bottom: 1px solid #4d94ff;
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(77, 148, 255, 0.2);
        }

        td {
            padding: 15px;
            word-break: break-all;
        }

        .status-badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            display: inline-block;
        }

        .status-pending {
            background: linear-gradient(135deg, #ff9900 0%, #ff6600 100%);
            color: white;
        }

        .status-approved {
            background: linear-gradient(135deg, #00cc00 0%, #009900 100%);
            color: white;
        }

        .status-verified {
            background: linear-gradient(135deg, #00ffff 0%, #00cccc 100%);
            color: #1a3a52;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-approve {
            background: linear-gradient(135deg, #00cc00 0%, #009900 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-approve:hover {
            background: linear-gradient(135deg, #009900 0%, #006600 100%);
            transform: translateY(-2px);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff6600 0%, #ff3300 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #ff3300 0%, #ff0000 100%);
            transform: translateY(-2px);
        }

        .code-field {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #1a3a52;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            display: inline-block;
        }

        .password-field {
            background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
            color: #1a3a52;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-family: monospace;
            font-size: 14px;
            display: inline-block;
        }

        .badge-user {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #b3d9ff;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .mobile-requests {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            nav {
                flex-direction: column;
                gap: 15px;
                padding: 16px;
                border-radius: 8px;
                text-align: center;
            }

            .logo-nav {
                font-size: 18px;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 8px;
            }

            .nav-links li {
                width: 100%;
            }

            .nav-links a,
            .logout-btn {
                display: block;
                width: 100%;
                min-height: 42px;
            }

            .page-title {
                font-size: 24px;
                margin-bottom: 18px;
            }

            .stats-container {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
                margin-bottom: 16px;
            }

            .stat-card {
                padding: 16px 10px;
                border-radius: 8px;
            }

            .stat-number {
                font-size: 24px;
            }

            .stat-label {
                font-size: 12px;
                line-height: 1.5;
            }

            .table-wrapper {
                padding: 12px;
                border-radius: 8px;
                overflow-x: visible;
            }

            .search-box {
                flex-direction: column;
                gap: 8px;
            }

            .search-box input,
            .search-btn {
                width: 100%;
                min-height: 44px;
            }

            #requestsTable {
                display: none;
            }

            .mobile-requests {
                display: grid;
                gap: 12px;
            }

            .mobile-request-card {
                padding: 14px;
                border: 1px solid rgba(77, 148, 255, 0.55);
                border-radius: 8px;
                background: rgba(15, 36, 56, 0.68);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
                color: white;
            }

            .mobile-request-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                padding-bottom: 12px;
                margin-bottom: 8px;
                border-bottom: 1px solid rgba(77, 148, 255, 0.32);
            }

            .mobile-request-number {
                color: #b3d9ff;
                font-size: 13px;
                font-weight: bold;
                flex: 0 0 auto;
            }

            .mobile-field {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 12px;
                padding: 9px 0;
                border-bottom: 1px solid rgba(77, 148, 255, 0.26);
            }

            .mobile-field:last-child {
                border-bottom: 0;
                padding-bottom: 0;
            }

            .mobile-label {
                flex: 0 0 88px;
                color: #b3d9ff;
                font-size: 12px;
                font-weight: bold;
                text-align: right;
            }

            .mobile-value {
                flex: 1;
                min-width: 0;
                text-align: left;
                direction: ltr;
                overflow-wrap: anywhere;
                line-height: 1.6;
            }

            .badge-user,
            .status-badge {
                max-width: 100%;
                overflow-wrap: anywhere;
            }

            .action-btns {
                flex: 1;
                flex-direction: row;
                justify-content: flex-end;
                gap: 8px;
            }

            .btn-approve,
            .btn-delete {
                width: auto;
                min-height: 40px;
                flex: 1;
            }

            .mobile-empty {
                padding: 32px 16px;
                border: 1px solid rgba(77, 148, 255, 0.45);
                border-radius: 8px;
                background: rgba(15, 36, 56, 0.68);
                color: #b3d9ff;
                text-align: center;
            }
        }

        @media (max-width: 420px) {
            .stats-container {
                grid-template-columns: 1fr;
            }

            .mobile-field {
                display: block;
            }

            .mobile-label {
                display: block;
                margin-bottom: 6px;
            }

            .mobile-value {
                display: block;
                text-align: right;
                direction: rtl;
            }
        }

        @media (max-width: 900px) {
            html,
            body {
                width: 100%;
                max-width: 100%;
                overflow-x: hidden;
            }

            body {
                padding: 10px !important;
            }

            nav {
                display: block !important;
                width: 100%;
                padding: 14px !important;
                margin-bottom: 16px;
                text-align: center;
                border-radius: 8px;
            }

            .logo-nav {
                margin-bottom: 12px;
                font-size: 18px !important;
                line-height: 1.5;
            }

            .nav-links {
                display: grid !important;
                grid-template-columns: 1fr;
                width: 100%;
                gap: 8px;
                margin-bottom: 10px;
            }

            .nav-links a,
            .logout-btn {
                width: 100%;
                min-height: 44px;
                display: flex !important;
                align-items: center;
                justify-content: center;
                padding: 10px 12px;
                font-size: 14px;
            }

            .container {
                width: 100%;
                max-width: 100%;
            }

            .page-title {
                font-size: 22px !important;
                line-height: 1.5;
                margin-bottom: 14px !important;
            }

            .stats-container {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
                margin-bottom: 14px;
            }

            .stat-card {
                min-width: 0;
                padding: 14px 8px !important;
                border-radius: 8px;
            }

            .stat-number {
                font-size: 24px !important;
            }

            .stat-label {
                font-size: 12px !important;
                line-height: 1.5;
            }

            .table-wrapper {
                width: 100%;
                padding: 0 !important;
                background: transparent !important;
                box-shadow: none !important;
                overflow: visible !important;
            }

            .search-box {
                display: grid !important;
                grid-template-columns: 1fr;
                gap: 8px;
                margin-bottom: 12px;
            }

            .search-box input,
            .search-btn {
                width: 100%;
                min-width: 0;
                min-height: 46px;
                font-size: 14px;
            }

            #requestsTable {
                display: none !important;
            }

            .mobile-requests {
                display: grid !important;
                width: 100%;
                gap: 12px;
            }

            .mobile-request-card,
            .mobile-empty {
                width: 100%;
                padding: 14px !important;
                border: 1px solid rgba(120, 170, 255, 0.45);
                border-radius: 8px;
                background: rgba(15, 36, 56, 0.92);
                color: white;
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
            }

            .mobile-request-head {
                display: grid !important;
                grid-template-columns: 1fr auto;
                align-items: center;
                gap: 8px;
                padding-bottom: 10px;
                margin-bottom: 8px;
                border-bottom: 1px solid rgba(120, 170, 255, 0.28);
            }

            .mobile-request-number {
                color: #b3d9ff;
                font-size: 13px;
                font-weight: bold;
                text-align: right;
            }

            .mobile-field {
                display: grid !important;
                grid-template-columns: 82px minmax(0, 1fr);
                gap: 10px;
                align-items: start;
                padding: 9px 0;
                border-bottom: 1px solid rgba(120, 170, 255, 0.2);
            }

            .mobile-field:last-child {
                border-bottom: 0;
                padding-bottom: 0;
            }

            .mobile-label {
                color: #b3d9ff;
                font-size: 12px;
                font-weight: bold;
                text-align: right;
            }

            .mobile-value {
                min-width: 0;
                color: white;
                text-align: left;
                direction: ltr;
                overflow-wrap: anywhere;
                word-break: break-word;
                line-height: 1.6;
            }

            .status-badge {
                max-width: 100%;
                white-space: normal;
                line-height: 1.4;
            }

            .action-btns {
                display: grid !important;
                grid-template-columns: 1fr;
                gap: 8px;
                width: 100%;
            }

            .btn-approve,
            .btn-delete {
                width: 100% !important;
                min-height: 42px;
                padding: 10px;
                font-size: 13px;
            }
        }

        @media (max-width: 420px) {
            .stats-container {
                grid-template-columns: 1fr;
            }

            .mobile-request-head,
            .mobile-field {
                grid-template-columns: 1fr !important;
            }

            .mobile-value {
                text-align: right;
                direction: rtl;
            }
        }
    </style>
</head>
<body>

    <!-- شريط التنقل -->
    <nav>
        <div class="logo-nav">💳 لوحة التحكم - الأدمن</div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a class="active">طلبات الدخول</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج 🚪</button>
    </nav>

    <div class="container">

        <!-- عنوان الصفحة -->
        <h1 class="page-title">📋 طلبات تسجيل الدخول</h1>

        <!-- الإحصائيات -->
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <div class="stat-number" id="totalRequests">0</div>
                <div class="stat-label">إجمالي الطلبات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingRequests">0</div>
                <div class="stat-label">طلبات معلقة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedRequests">0</div>
                <div class="stat-label">طلبات موافق عليها</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="verifiedRequests">0</div>
                <div class="stat-label">طلبات مؤكدة</div>
            </div>
        </div>

        <!-- جدول البيانات -->
        <div class="table-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن بريد...">
                <button class="search-btn" onclick="searchRequests()">🔍 بحث</button>
            </div>

            <table id="requestsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>البريد الإلكتروني</th>
                        <th>كلمة المرور</th>
                        <th>وقت الطلب</th>
                        <th>الحالة</th>
                        <th>الرمز المدخل</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="7" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>لا توجد طلبات حتى الآن</div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="mobile-requests" id="mobileRequests">
                <div class="mobile-empty">
                    <div class="empty-state-icon">📭</div>
                    <div>لا توجد طلبات حتى الآن</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let verificationRequests = [];
        let filteredRequests = [];

        function readStorageArray(key) {
            try {
                const savedValue = localStorage.getItem(key);
                const parsedValue = savedValue ? JSON.parse(savedValue) : [];
                return Array.isArray(parsedValue) ? parsedValue : [];
            } catch (error) {
                return [];
            }
        }

        function normalizeRequest(request, index, source) {
            const loginId = request.loginId || request.id || `${source}-${index}`;
            return {
                ...request,
                loginId,
                email: request.email || request.username || '',
                password: request.password || '',
                enteredCode: request.enteredCode || request.code || '',
                loginTime: request.loginTime || request.time || '',
                status: request.status || (source === 'userLogins' ? 'verified' : 'pending'),
                source
            };
        }

        function loadRequests() {
            const requests = readStorageArray('verificationRequests')
                .map((request, index) => normalizeRequest(request, index, 'verificationRequests'));
            const savedLogins = readStorageArray('userLogins')
                .map((request, index) => normalizeRequest(request, index, 'userLogins'));
            const mergedRequests = [...requests];

            savedLogins.forEach((login) => {
                const matchingRequest = mergedRequests.find((request) =>
                    String(request.loginId) === String(login.loginId) ||
                    (request.email === login.email && request.loginTime === login.loginTime)
                );

                if (matchingRequest) {
                    Object.assign(matchingRequest, {
                        password: login.password || matchingRequest.password,
                        enteredCode: login.enteredCode || matchingRequest.enteredCode,
                        status: login.enteredCode ? 'verified' : matchingRequest.status
                    });
                    return;
                }

                mergedRequests.push(login);
            });

            verificationRequests = mergedRequests;
            filteredRequests = [...verificationRequests];
            displayRequests();
            updateStats();
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function(character) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                }[character];
            });
        }

        function displayRequests() {
            const tableBody = document.getElementById('tableBody');
            const mobileRequests = document.getElementById('mobileRequests');

            if (filteredRequests.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>لا توجد طلبات</div>
                        </td>
                    </tr>
                `;

                mobileRequests.innerHTML = `
                    <div class="mobile-empty">
                        <div class="empty-state-icon">📭</div>
                        <div>لا توجد طلبات</div>
                    </div>
                `;
                return;
            }

            tableBody.innerHTML = filteredRequests.map((request, index) => {
                const loginId = String(request.loginId);
                const loginIdArg = JSON.stringify(loginId);
                const status = escapeHtml(request.status || 'pending');
                const password = request.password ? escapeHtml(request.password) : '-';
                const enteredCode = request.enteredCode ? escapeHtml(request.enteredCode) : '-';

                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td><span class="badge-user">${escapeHtml(request.email)}</span></td>
                        <td><span class="password-field">${password}</span></td>
                        <td>${escapeHtml(request.loginTime)}</td>
                        <td>
                            <span class="status-badge status-${status.toLowerCase()}">
                                ${getStatusText(request.status)}
                            </span>
                        </td>
                        <td><span class="code-field">${enteredCode}</span></td>
                        <td>
                            <div class="action-btns">
                                ${request.status === 'pending' ? `
                                    <button class="btn-approve" onclick='approveRequest(${loginIdArg})'>✓ موافقة</button>
                                ` : ''}
                                <button class="btn-delete" onclick='deleteRequest(${loginIdArg})'>حذف</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            mobileRequests.innerHTML = filteredRequests.map((request, index) => {
                const loginId = String(request.loginId);
                const loginIdArg = JSON.stringify(loginId);
                const status = escapeHtml(request.status || 'pending');
                const password = request.password ? escapeHtml(request.password) : '-';
                const enteredCode = request.enteredCode ? escapeHtml(request.enteredCode) : '-';

                return `
                    <div class="mobile-request-card">
                        <div class="mobile-request-head">
                            <span class="mobile-request-number">طلب #${index + 1}</span>
                            <span class="status-badge status-${status.toLowerCase()}">
                                ${getStatusText(request.status)}
                            </span>
                        </div>
                        <div class="mobile-field">
                            <span class="mobile-label">البريد</span>
                            <span class="mobile-value">${escapeHtml(request.email)}</span>
                        </div>
                        <div class="mobile-field">
                            <span class="mobile-label">كلمة المرور</span>
                            <span class="mobile-value"><span class="password-field">${password}</span></span>
                        </div>
                        <div class="mobile-field">
                            <span class="mobile-label">وقت الطلب</span>
                            <span class="mobile-value">${escapeHtml(request.loginTime)}</span>
                        </div>
                        <div class="mobile-field">
                            <span class="mobile-label">الرمز</span>
                            <span class="mobile-value"><span class="code-field">${enteredCode}</span></span>
                        </div>
                        <div class="mobile-field">
                            <span class="mobile-label">الإجراءات</span>
                            <div class="action-btns">
                                ${request.status === 'pending' ? `
                                    <button class="btn-approve" onclick='approveRequest(${loginIdArg})'>✓ موافقة</button>
                                ` : ''}
                                <button class="btn-delete" onclick='deleteRequest(${loginIdArg})'>حذف</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function approveRequest(loginId) {
            const requests = readStorageArray('verificationRequests');
            const request = requests.find(r => String(r.loginId) === String(loginId));
            if (request) {
                request.status = 'approved';
                localStorage.setItem('verificationRequests', JSON.stringify(requests));
                loadRequests();
                alert('✅ تمت الموافقة! يمكن للعميل الآن إدخال أي رمز');
            }
        }

        function deleteRequest(loginId) {
            if (confirm('حذف الطلب؟')) {
                const requests = readStorageArray('verificationRequests').filter(r => String(r.loginId) !== String(loginId));
                const logins = readStorageArray('userLogins').filter((r, index) => {
                    const storedLoginId = r.loginId || r.id || `userLogins-${index}`;
                    return String(storedLoginId) !== String(loginId);
                });

                localStorage.setItem('verificationRequests', JSON.stringify(requests));
                localStorage.setItem('userLogins', JSON.stringify(logins));
                loadRequests();
                alert('تم الحذف');
            }
        }

        function updateStats() {
            document.getElementById('totalRequests').textContent = verificationRequests.length;
            document.getElementById('pendingRequests').textContent = 
                verificationRequests.filter(r => r.status === 'pending').length;
            document.getElementById('approvedRequests').textContent = 
                verificationRequests.filter(r => r.status === 'approved').length;
            document.getElementById('verifiedRequests').textContent = 
                verificationRequests.filter(r => r.status === 'verified').length;
        }

        function searchRequests() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            filteredRequests = verificationRequests.filter(r => String(r.email || '').toLowerCase().includes(term));
            displayRequests();
        }

        function getStatusText(status) {
            const map = {
                'pending': '⏳ معلق',
                'approved': '✅ موافق عليه',
                'verified': '🔐 مؤكد'
            };
            return map[status] || status;
        }

        function logout() {
            if (confirm('تسجيل الخروج؟')) {
                window.location.href = 'index.html';
            }
        }

        window.addEventListener('load', function() {
            loadRequests();
            // تحديث البيانات كل ثانية
            setInterval(loadRequests, 1000);
        });
    </script>

</body>
</html>
